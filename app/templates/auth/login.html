{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-card border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h2 class="text-center fw-bold mb-4">歡迎回來 👋</h2>
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted fw-bold">電子郵件</label>
                        <input type="email" class="form-control form-control-lg bg-light" id="email" name="email" required autofocus placeholder="name@example.com">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted fw-bold">密碼</label>
                        <input type="password" class="form-control form-control-lg bg-light" id="password" name="password" required placeholder="••••••••">
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3 shadow-sm">登入</button>
                    </div>
                </form>
                <div class="text-center mt-4 text-muted">
                    還沒有帳號嗎？ <a href="{{ url_for('auth.register_page') }}" class="text-decoration-none fw-bold">立即註冊</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
