{% extends "base.html" %}

{% block content %}
<h2 class="fw-bold mb-4">❤️ 我的收藏 ({{ favorites|length }})</h2>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for fav in favorites %}
    <div class="col">
        <div class="card h-100 border-0 shadow-sm rounded-4 text-decoration-none text-dark" onclick="location.href='{{ url_for('recipe.detail', id=fav.recipe_id) }}'" style="cursor:pointer;">
            <div class="card-body">
                <h5 class="card-title fw-bold text-truncate">{{ fav.recipe_title }}</h5>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="badge bg-warning text-dark">收藏時間: {{ fav.saved_at[:10] }}</span>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <h3 class="text-muted">目前還沒有收藏任何食譜</h3>
        <a href="{{ url_for('recipe.index') }}" class="btn btn-primary mt-3">去探索食譜</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
